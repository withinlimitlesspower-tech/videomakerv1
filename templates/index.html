<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Maker Studio</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>Chats</h2>
            <button id="new-chat-btn">+</button>
        </div>
        <ul id="chat-list"></ul>
    </div>
    <div id="main">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Type a message... (use /video <prompt> or /audio <text>)">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
